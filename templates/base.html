<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SocialConnect{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #f0f2f5; }
  .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
  .post-card { margin-bottom: 1.2rem; }
  .avatar-sm { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
  .avatar-lg { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
  .like-btn { cursor: pointer; }
  .like-btn.liked { color: #e0245e; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'feed' %}"><i class="fas fa-globe"></i> SocialConnect</a>
    <div class="navbar-nav ms-auto">
      {% if user.is_authenticated %}
      <a class="nav-link text-white" href="{% url 'profile' user.username %}"><i class="fas fa-user"></i> {{ user.username }}</a>
      <a class="nav-link text-white" href="{% url 'edit_profile' %}"><i class="fas fa-cog"></i></a>
      <a class="nav-link text-white" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i></a>
      {% else %}
      <a class="nav-link text-white" href="{% url 'login' %}">Login</a>
      <a class="nav-link text-white" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
