<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ConnectHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.12); width: 100%; max-width: 400px; }
        .brand { font-size: 32px; font-weight: 800; color: #1877f2; text-align: center; margin-bottom: 8px; }
        .tagline { text-align: center; color: #65676b; margin-bottom: 24px; font-size: 15px; }
        .form-input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 12px; }
        .form-input:focus { border-color: #1877f2; }
        .btn-primary { width: 100%; padding: 12px; background: #1877f2; color: #fff; border: none; border-radius: 8px; font-size: 17px; font-weight: 700; cursor: pointer; }
        .btn-primary:hover { background: #166fe5; }
        .divider { border: none; border-top: 1px solid #e4e6eb; margin: 20px 0; }
        .text-center { text-align: center; }
        .link { color: #1877f2; text-decoration: none; font-weight: 600; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; background: #f8d7da; color: #721c24; font-size: 14px; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="brand">ConnectHub</div>
    <div class="tagline">Connect with friends and the world around you.</div>
    {% if messages %}{% for message in messages %}<div class="alert">{{ message }}</div>{% endfor %}{% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" class="form-input" placeholder="Username" required>
        <input type="password" name="password" class="form-input" placeholder="Password" required>
        <button type="submit" class="btn-primary">Log In</button>
    </form>
    <hr class="divider">
    <div class="text-center">
        <a href="/register/" class="link">Create new account</a>
    </div>
</div>
</body>
</html>
