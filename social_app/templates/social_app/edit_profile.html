{% extends 'social_app/base.html' %}
{% block title %}Edit Profile - ConnectHub{% endblock %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom:16px;">Edit Profile</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom:14px;">
            <label style="display:block;font-weight:600;font-size:14px;margin-bottom:4px;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:#c0392b;font-size:13px;margin-top:3px;">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/profile/{{ user.username }}/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
